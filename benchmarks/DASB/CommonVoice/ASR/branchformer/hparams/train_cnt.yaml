# ################################
# Script for training an ASR model evaluating an SSL representation
# model on one language from the CommonVoice dataset. A SentencePiece tokenizer
# with number of tokens equal to <output_neurons> is learned in a first phase
# on the considered language.
#
# Authors
# * Pooneh Mousavi 2024
# ################################

# Seed needs to be set at top of yaml, before objects with parameters are made
seed: 1986
__set_seed: !apply:torch.manual_seed [!ref <seed>]

language: cy # use 'cy' for Welsh  and 'eu' for Basque
output_folder: !ref results/<language>/
output_wer_folder: !ref <output_folder>/wer_test.txt
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt
testing: True

# Data files
data_folder: !PLACEHOLDER # e.g, /local/cv-corpus-11.0-2022-09-21/<language>
train_tsv_file: !ref <data_folder>/train.tsv  # Standard CommonVoice .tsv files
dev_tsv_file: !ref <data_folder>/dev.tsv  # Standard CommonVoice .tsv files
test_tsv_file: !ref <data_folder>/test.tsv  # Standard CommonVoice .tsv files
accented_letters: True
train_csv: !ref <save_folder>/train.csv
valid_csv: !ref <save_folder>/dev.csv
test_csv: !ref <save_folder>/test.csv
skip_prep: False # Skip data preparation


#tokens_folder: !PLACEHOLDER  # Path to the folder where extracted tokens are saved.
#pretrain_embeddings_folder: none

# Training parameters
number_of_epochs: 20
avoid_if_longer_than: 10.0
batch_size: 8
test_batch_size: 1
grad_accumulation_factor: 3
max_grad_norm: 5.0
sorting: descending #random
num_workers: 8
loss_reduction: batchmean
precision: fp32 # bf16, fp16 or fp32loss_reduction: batchmean
valid_search_interval: 5
avg_checkpoints: 10 # Number of checkpoints to average for evaluation
ctc_weight: 0.3

lr_model: 0.0001 # @orion_step1: --lr_model~"loguniform(0.00001, 0.1)"
weight_decay: 0.0005

# Training parameters
dynamic_batching: True
max_batch_length_train: 850
max_batch_len_val: 100
num_bucket: 200
shuffle: False # if true re-creates batches at each epoch shuffling examples.
max_batch_ex: 128
batch_ordering: random

dynamic_batch_sampler_train:
   max_batch_length: !ref <max_batch_length_train>
   num_buckets: !ref <num_bucket>
   shuffle: !ref <shuffle>
   batch_ordering: !ref <batch_ordering>
   max_batch_ex: !ref <max_batch_ex>

dynamic_batch_sampler_val:
   max_batch_length: !ref <max_batch_len_val>
   num_buckets: !ref <num_bucket>
   shuffle: !ref <shuffle>
   batch_ordering: !ref <batch_ordering>
   max_batch_ex: !ref <max_batch_ex>


# Dataloader options
train_dataloader_opts:
   batch_size: !ref <batch_size>
   shuffle: True
   num_workers: !ref <num_workers>

test_dataloader_opts:
   batch_size: !ref <test_batch_size>


valid_dataloader_opts:
   batch_size: !ref <batch_size>

######################## Model parameters #########################
# Tokenizer parameters
# These parameters should be set according to the tokenizer used to extract tokens saved in <tokens_folder>.
vocab_size: 1024
num_codebooks: 2
sample_rate: 24000

# Feature parameters
encoder_dim: 1024
# If set to True, encoder_dim should match the dimension of the tokenizer. For Encodec, it is 128.
pretrain_embeddings: False
freeze_embedding: False
embedding_dim: 1024
#embedding_strg: sum
embedding_strg: att_pool
scalar_embeddings: False # If True, the codebooks are scalar quantized

# Transformer
d_model: 144
nhead: 4
num_encoder_layers: 12
num_decoder_layers: 4
d_ffn: 1024
transformer_dropout: 0.1
activation: !name:torch.nn.GELU
output_neurons: 500
csgu_linear_units: 3072
csgu_kernel_size: 31

# option 1) 'conformer' for HyperConformer; option 2) 'transformer' for vanilla HyperMixer
encoder_module: branchformer

# Decoding parameters
# BPE parameters
# BPE parameters
token_type: bpe  # ["unigram", "bpe", "char"]
character_coverage: 1.0
blank_index: 0
label_smoothing: 0.1
pad_index: 0
bos_index: 1
eos_index: 2

min_decode_ratio: 0.0
max_decode_ratio: 1.0
valid_beam_size: 1
test_beam_size: 66
ctc_weight_decode: 0.40


#test_beam_search:
#   beam_size: 143
#   topk: 1
#   blank_index: !ref <blank_index>
#   space_token: ' ' # make sure this is the same as the one used in the tokenizer
#   beam_prune_logp: -12.0
#   token_prune_min_logp: -1.2
#   prune_history: True
#   alpha: 0.8
#   beta: 1.2
   # can be downloaded from here https://www.openslr.org/11/ or trained with kenLM
   # It can either be a .bin or .arpa ; note: .arpa is much slower at loading
   # If you don't want to use an LM, comment it out or set it to null
#   kenlm_model_path: null

# Functions and classes
#

ctc_scorer: !new:speechbrain.decoders.scorer.CTCScorer
   eos_index: !ref <eos_index>
   blank_index: !ref <blank_index>
   ctc_fc: !ref <ctc_lin>

scorer_valid_search: !new:speechbrain.decoders.scorer.ScorerBuilder
   full_scorers: [!ref <ctc_scorer>]
   weights:
      ctc: !ref <ctc_weight_decode>

valid_search: !new:speechbrain.decoders.S2STransformerBeamSearcher
   modules: [!ref <encoder>, !ref <seq_lin>]
   bos_index: !ref <bos_index>
   eos_index: !ref <eos_index>
   min_decode_ratio: !ref <min_decode_ratio>
   max_decode_ratio: !ref <max_decode_ratio>
   beam_size: !ref <valid_beam_size>
   using_eos_threshold: False
   length_normalization: True
   scorer: !ref <scorer_valid_search>

test_search: !new:speechbrain.decoders.S2STransformerBeamSearcher
   modules: [!ref <encoder>, !ref <seq_lin>]
   bos_index: !ref <bos_index>
   eos_index: !ref <eos_index>
   min_decode_ratio: !ref <min_decode_ratio>
   max_decode_ratio: !ref <max_decode_ratio>
   beam_size: !ref <test_beam_size>
   temperature: 1.15
   using_eos_threshold: False
   length_normalization: True
   scorer: !ref <scorer_valid_search>

epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
   limit: !ref <number_of_epochs>

# Modules
#tokens_loader: !new:utils.tokens.TokensLoader
#   data_path: !ref <tokens_folder>

#discrete_embedding_layer: !new:model.custom_model.Discrete_EmbeddingLayer
#   num_codebooks: !ref <num_codebooks>
#   vocab_size: !ref <vocab_size>
#   emb_dim: !ref <embedding_dim>
#   scalar: !ref <use_scalar_codebook>

#attention_mlp: !new:model.custom_model.AttentionMLP
#   input_dim: !ref <encoder_dim>
#   hidden_dim: !ref <encoder_dim>

ssl_hub: microsoft/wavlm-large
ssl_folder: !ref <output_folder>/ssl_checkpoints
weighted_ssl_model: !new:speechbrain.lobes.models.huggingface_transformers.WeightedSSLModel # yamllint disable-line rule:line-length
   hub: !ref <ssl_hub>
   save_path: !ref <ssl_folder>
   freeze: !ref <freeze_embedding>

encoder: !new:speechbrain.lobes.models.transformer.TransformerASR.TransformerASR # yamllint disable-line rule:line-length
   input_size: 1024
   tgt_vocab: !ref <output_neurons>
   d_model: !ref <d_model>
   nhead: !ref <nhead>
   num_encoder_layers: !ref <num_encoder_layers>
   num_decoder_layers: !ref <num_decoder_layers>
   dropout: !ref <transformer_dropout>
   activation: !ref <activation>
   branchformer_activation: !ref <activation>
   encoder_module: branchformer
   csgu_linear_units: !ref <csgu_linear_units>
   kernel_size: !ref <csgu_kernel_size>
   attention_type: RelPosMHAXL
   normalize_before: True
   causal: False

ctc_lin: !new:speechbrain.nnet.linear.Linear
   input_size: !ref <d_model>
   n_neurons: !ref <output_neurons>

seq_lin: !new:speechbrain.nnet.linear.Linear
   input_size: !ref <d_model>
   n_neurons: !ref <output_neurons>

log_softmax: !new:speechbrain.nnet.activations.Softmax
   apply_log: True

ctc_cost: !name:speechbrain.nnet.losses.ctc_loss
   blank_index: !ref <blank_index>

seq_cost: !name:speechbrain.nnet.losses.kldiv_loss
   label_smoothing: !ref <label_smoothing>
   reduction: !ref <loss_reduction

modules:
   encoder: !ref <encoder>
   ctc_lin: !ref <ctc_lin>
   seq_lin: !ref <seq_lin>
   weighted_ssl_model: !ref <weighted_ssl_model>
   #attention_mlp: !ref <attention_mlp>
   #discrete_embedding_layer: !ref <discrete_embedding_layer>

model: !new:torch.nn.ModuleList
   - [!ref <encoder>, !ref <ctc_lin>, !ref <seq_lin>]

model_opt_class: !name:torch.optim.AdamW
   lr: !ref <lr_model>
   betas: (0.9, 0.98)
   eps: 0.000000001
   weight_decay: !ref <weight_decay>

scheduler: !new:speechbrain.nnet.schedulers.NewBobScheduler
   initial_value: !ref <lr_model>
   improvement_threshold: 0.0025
   annealing_factor: 0.8
   patient: 0

label_encoder: !new:speechbrain.dataio.encoder.CTCTextEncoder

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
   checkpoints_dir: !ref <save_folder>
   recoverables:
      model: !ref <model>
      scheduler_model: !ref <scheduler>
      #attention_mlp: !ref <attention_mlp>
      #discrete_embedding_layer: !ref <discrete_embedding_layer>
      counter: !ref <epoch_counter>
      tokenizer: !ref <label_encoder>

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
   save_file: !ref <train_log>

error_rate_computer: !name:speechbrain.utils.metric_stats.ErrorRateStats
acc_computer: !name:speechbrain.utils.Accuracy.AccuracyStats

cer_computer: !name:speechbrain.utils.metric_stats.ErrorRateStats
   split_tokens: True
wer_computer: !name:speechbrain.utils.metric_stats.ErrorRateStats
